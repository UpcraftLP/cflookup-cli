name: CI

on:
  push:
    branches: [ "*" ]

env:
  APP_NAME: cflookup
  RUST_VERSION: stable

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      REPOSITORY_NAME: ${{ steps.setup.outputs.REPOSITORY_NAME }}
      BUILD_TIME: ${{ steps.setup.outputs.BUILD_TIME }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Environment
        id: setup
        run: |
          echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/}" >> $GITHUB_OUTPUT
          echo BUILD_TIME=$(date '+%y.%m%d.%H%M') >> $GITHUB_OUTPUT

  build_matrix:
    name: "Build and Test (${{ matrix.os_name }} ${{ matrix.target_name }})"
    needs: init
    env:
      VERSION: ${{ needs.init.outputs.BUILD_TIME }}
    permissions:
      id-token: write
      contents: read
      attestations: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
            target: x86_64-unknown-linux-gnu
            target_name: x64
          - os: ubuntu-24.04-arm
            os_name: linux
            target: aarch64-unknown-linux-gnu
            target_name: arm64
          - os: windows-latest
            os_name: windows
            target: x86_64-pc-windows-msvc
            target_name: x64
          - os: macos-latest
            os_name: macos
            target: aarch64-apple-darwin
            target_name: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Setup Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target_name }}

      - name: Run Tests
        run: "cargo test --locked --all-features --verbose --target ${{ matrix.target }} --profile dev"

      - name: Build
        run: "cargo build --locked --verbose --target ${{ matrix.target }} --release"

      - name: Upload Artifacts
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.init.outputs.REPOSITORY_NAME }}-${{ matrix.os_name }}-${{ matrix.target_name }}-${{ env.VERSION }}
          if-no-files-found: error
          path: |
            target/${{ matrix.target }}/release/${{ env.APP_NAME }}*

      - name: Generate Build Attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            target/${{ matrix.target }}/release/${{ env.APP_NAME }}*

  dependency_info:
    name: Submit Dependency Information
    needs: build_matrix
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Collect and submit dependency information
        uses: advanced-security/component-detection-dependency-submission-action@9c110eb34dee187cd9eca76a652b9f6a0ed22927 # v0.1.1
